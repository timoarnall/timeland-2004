<!doctype html>
<html>
<head><meta charset="utf-8"><title>FPS profile</title>
<style>body{font:14px/1.4 -apple-system,system-ui;padding:20px}pre{background:#f4f4f4;padding:12px}</style>
</head>
<body>
<h3>FPS profile (samples last 10 s of rAF in each iframe)</h3>
<pre id="log">starting…</pre>
<iframe id="f" src="" style="width:540px;height:540px;border:1px solid #ccc;display:block"></iframe>
<script>
const log = document.getElementById('log');
function out(s){ log.textContent += "\n" + s; }
async function profile(label, url, settle_ms = 7000, sample_ms = 10000){
  out("---");
  out(label + ": loading " + url);
  const f = document.getElementById('f');
  await new Promise(r => { f.onload = r; f.src = url; });
  // Wait for the page to fully settle / play-in to finish.
  await new Promise(r => setTimeout(r, settle_ms));
  const win = f.contentWindow;
  let count = 0;
  let stopped = false;
  function tick(){ if (stopped) return; count++; win.requestAnimationFrame(tick); }
  win.requestAnimationFrame(tick);
  await new Promise(r => setTimeout(r, sample_ms));
  stopped = true;
  const fps = count / (sample_ms / 1000);
  out(label + ": " + fps.toFixed(1) + " fps (" + count + " rAF in " + sample_ms + " ms)");
}
(async () => {
  // Park each version near end-of-trip where 1,200 photos are active.
  await profile("archaeology (241 photos, 320 src)",
    "http://localhost:8765/index.html?play=1&seek=0.95&nocontrols=1");
  await profile("experiment-2026 (1,200 photos, tier+cull)",
    "http://localhost:8765/experiment-2026/index.html?play=1&seek=0.95&nocontrols=1");
  out("---\ndone.");
})();
</script>
</body></html>
