<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time that land forgot</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg: #0a0a0a;
  --fg: #f2f2f2;
  --muted: #777;
  --line: #1f1f1f;
  --accent: #ff5a1f;
  --font: -apple-system, "SF Pro Text", "SF Pro", system-ui, sans-serif;
  --base: 13px;
  --heading: 26px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--fg); font: 600 var(--base)/1.4 var(--font); }
body { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
header { padding: 16px 20px 12px; border-bottom: 1px solid var(--line); }
h1 { font-size: var(--heading); font-weight: 600; letter-spacing: -0.01em; }
.sub { color: var(--muted); margin-top: 4px; }
.sub a { color: inherit; text-decoration: underline; text-decoration-color: var(--line); }
.sub a:hover { color: var(--fg); }
main { display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
#map { height: 100%; background: #050505; }
.photo {
  display: flex; align-items: center; justify-content: center;
  background: #000; position: relative; overflow: hidden;
  border-left: 1px solid var(--line);
}
.photo img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  transition: opacity 120ms ease;
}
.photo img.loading { opacity: 0.4; }
.photo .meta {
  position: absolute; bottom: 12px; left: 14px; right: 14px;
  color: rgba(255,255,255,0.7); font-size: 11px;
  font-variant-numeric: tabular-nums; pointer-events: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  display: flex; justify-content: space-between;
}
footer {
  padding: 14px 20px;
  display: grid; grid-template-columns: 80px 1fr 22ch; gap: 16px; align-items: center;
  border-top: 1px solid var(--line);
}
button {
  background: none; border: 1px solid var(--muted); color: var(--fg);
  padding: 6px 0; font: 600 12px var(--font); cursor: pointer; border-radius: 2px;
}
button:hover { border-color: var(--fg); }
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 4px; background: var(--line);
  border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
}
.time { font-variant-numeric: tabular-nums; color: var(--muted); text-align: right; }
.time .now { color: var(--fg); }
.leaflet-container { background: #050505; font: 600 11px var(--font); }
.leaflet-control-attribution { background: rgba(0,0,0,0.5); color: var(--muted); }
.leaflet-control-attribution a { color: var(--muted); }
.photo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); border: 1px solid #000; cursor: pointer;
  transition: transform 120ms ease;
}
.photo-dot.active {
  width: 14px; height: 14px; background: #fff; border-color: var(--accent);
  transform: translate(-4px, -4px);
}
.cursor-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: 1px solid #fff;
}
</style>
</head>
<body>
<header>
  <h1>Time that land forgot</h1>
  <div class="sub">
    Iceland, 30 June – 6 July 2004 · 260 photographs along a 1,500 km GPS trail ·
    Timo Arnall &amp; Even Westvang ·
    <a href="archive/index_original.html">original 2004 page</a> ·
    <a href="time_land_forgot.mov">QuickTime version</a>
  </div>
</header>
<main>
  <div id="map"></div>
  <div class="photo">
    <img id="img" alt="">
    <div class="meta"><span id="metaFile"></span><span id="metaTime"></span></div>
  </div>
</main>
<footer>
  <button id="play">Play</button>
  <input type="range" id="scrub" min="0" max="10000" value="0" step="1">
  <div class="time"><span class="now" id="nowT">—</span></div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const PHOTO_DIR = 'data/photos/';
const GPX_URL   = 'data/timo_iceland_noflight.gpx';
const XML_URL   = 'data/imageData.xml';

(async function () {
  const [gpxText, xmlText] = await Promise.all([
    fetch(GPX_URL).then(r => r.text()),
    fetch(XML_URL).then(r => r.text()),
  ]);

  const trkpts = parseGPX(gpxText);
  const photos = parseImages(xmlText);

  for (const p of photos) {
    const pt = nearestPoint(trkpts, p.t);
    p.lat = pt.lat; p.lon = pt.lon;
  }

  const map = L.map('map', { zoomControl: true, attributionControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &middot; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const trackLine = L.polyline(trkpts.map(p => [p.lat, p.lon]), {
    color: '#ff5a1f', weight: 1.4, opacity: 0.55,
  }).addTo(map);
  map.fitBounds(trackLine.getBounds(), { padding: [24, 24] });

  const dot = L.divIcon({ className: 'photo-dot', iconSize: [6, 6] });
  const dotActive = L.divIcon({ className: 'photo-dot active', iconSize: [14, 14] });
  photos.forEach((p, i) => {
    p.marker = L.marker([p.lat, p.lon], { icon: dot, keyboard: false }).addTo(map);
    p.marker.on('click', () => { stopPlay(); setIndex(i); });
  });

  const cursor = L.marker([trkpts[0].lat, trkpts[0].lon], {
    icon: L.divIcon({ className: 'cursor-dot', iconSize: [10, 10] }),
    interactive: false,
    zIndexOffset: 1000,
  }).addTo(map);

  const t0 = Math.min(trkpts[0].t, photos[0].t);
  const t1 = Math.max(trkpts[trkpts.length-1].t, photos[photos.length-1].t);

  const scrub = document.getElementById('scrub');
  const img = document.getElementById('img');
  const metaFile = document.getElementById('metaFile');
  const metaTime = document.getElementById('metaTime');
  const nowT = document.getElementById('nowT');
  const playBtn = document.getElementById('play');

  let cur = -1;

  function setT(t) {
    const gpt = nearestPoint(trkpts, t);
    cursor.setLatLng([gpt.lat, gpt.lon]);

    const i = nearestIndex(photos, t);
    if (i !== cur) {
      if (cur >= 0) photos[cur].marker.setIcon(dot);
      photos[i].marker.setIcon(dotActive);
      const p = photos[i];
      img.classList.add('loading');
      img.onload = () => img.classList.remove('loading');
      img.src = PHOTO_DIR + p.file;
      metaFile.textContent = p.file;
      metaTime.textContent = formatTime(p.t);
      cur = i;
    }
    nowT.textContent = formatTime(t);
  }

  function setIndex(i) {
    i = Math.max(0, Math.min(photos.length - 1, i));
    setT(photos[i].t);
    const f = (photos[i].t - t0) / (t1 - t0);
    scrub.value = Math.round(f * +scrub.max);
  }

  scrub.addEventListener('input', e => {
    stopPlay();
    const f = +e.target.value / +e.target.max;
    setT(t0 + f * (t1 - t0));
  });

  let timer = null;
  function startPlay() {
    if (timer) return;
    playBtn.textContent = 'Pause';
    timer = setInterval(() => {
      if (cur >= photos.length - 1) { stopPlay(); return; }
      setIndex(cur + 1);
    }, 700);
  }
  function stopPlay() {
    if (!timer) return;
    clearInterval(timer); timer = null;
    playBtn.textContent = 'Play';
  }
  playBtn.addEventListener('click', () => timer ? stopPlay() : startPlay());

  document.addEventListener('keydown', e => {
    if (e.key === ' ')        { e.preventDefault(); timer ? stopPlay() : startPlay(); }
    else if (e.key === 'ArrowRight') { stopPlay(); setIndex(cur + 1); }
    else if (e.key === 'ArrowLeft')  { stopPlay(); setIndex(cur - 1); }
  });

  setIndex(0);
})();

function parseGPX(text) {
  const xml = new DOMParser().parseFromString(text, 'application/xml');
  const pts = [...xml.getElementsByTagName('trkpt')].map(n => {
    const tNode = n.getElementsByTagName('time')[0];
    return {
      lat: +n.getAttribute('lat'),
      lon: +n.getAttribute('lon'),
      t: tNode ? Date.parse(tNode.textContent) : NaN,
    };
  }).filter(p => !isNaN(p.t));
  pts.sort((a, b) => a.t - b.t);
  return pts;
}

function parseImages(text) {
  const xml = new DOMParser().parseFromString(text, 'application/xml');
  return [...xml.getElementsByTagName('image')].map(n => {
    const file = n.getElementsByTagName('file')[0].textContent.trim();
    const tStr = n.getElementsByTagName('time')[0].textContent.trim();
    const m = tStr.match(/(\d{4}):(\d{2}):(\d{2})\s+(\d{2}):(\d{2}):(\d{2})/);
    // Iceland keeps GMT year-round, so EXIF local == UTC.
    const t = Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]);
    return { file, t };
  }).sort((a, b) => a.t - b.t);
}

function nearestPoint(pts, t) {
  if (t <= pts[0].t) return pts[0];
  if (t >= pts[pts.length - 1].t) return pts[pts.length - 1];
  let lo = 0, hi = pts.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (pts[mid].t < t) lo = mid; else hi = mid;
  }
  return (t - pts[lo].t) < (pts[hi].t - t) ? pts[lo] : pts[hi];
}

function nearestIndex(arr, t) {
  if (t <= arr[0].t) return 0;
  if (t >= arr[arr.length - 1].t) return arr.length - 1;
  let lo = 0, hi = arr.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (arr[mid].t < t) lo = mid; else hi = mid;
  }
  return (t - arr[lo].t) < (arr[hi].t - t) ? lo : hi;
}

function formatTime(t) {
  const d = new Date(t);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} `
       + `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())} UTC`;
}
</script>
</body>
</html>
